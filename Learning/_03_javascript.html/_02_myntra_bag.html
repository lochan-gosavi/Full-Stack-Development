<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style1.css">
</head>

<body>
    <button class="bag-button"
        onclick="cartquantity=cartquantity + 1;document.querySelector('#cart-summary').innerText = `Your Bag has ` + cartquantity + ` items`">Add
        to Bag</button>
    <button class="wish-button">Move to Wishlist</button>
    <button class="bag-button">Add 1 + 1 sale item</button>
    <h1 id="cart-summary"></h1>
    <script>
        let cartquantity = 0;
        document.querySelector('#cart-summary').innerText = 'Your Bag has ' + cartquantity + ' items';
    </script>
</body>

</html>
