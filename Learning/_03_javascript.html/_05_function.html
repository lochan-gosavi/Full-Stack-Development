<!DOCTYPE html>
<html lang="en">

<head>
    <title>Function</title>
</head>

<body>
    <script>
        let age;
        function printage() {
            console.log(`Your age is : ` + age);
        }
        age = 56;
        printage();
        age = 98;
        printage();
        age = 56;
        printage();
    </script>

</body>

</html>
